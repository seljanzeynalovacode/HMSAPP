<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Həkimi Redaktə Et</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="card">
    <a href="index.html" class="btn-back">← Siyahıya geri qayıt</a>
    <h2>✏️ Həkim Məlumatlarını Yenilə</h2><br>

    <form id="editForm" class="form-grid">
        <div class="input-group"><label>Ad</label><input type="text" id="name" required></div>
        <div class="input-group"><label>Soyad</label><input type="text" id="surname" required></div>
        <div class="input-group"><label>E-poçt</label><input type="email" id="email" required></div>
        <div class="input-group"><label>Telefon</label><input type="tel" id="phone" required></div>
        <div class="input-group"><label>İxtisas</label><input type="text" id="specialty" required></div>
        <div class="input-group"><label>Lisenziya №</label><input type="text" id="licenseNumber" required></div>
        <div class="input-group"><label>Klinika Ünvanı</label><input type="text" id="clinicAddress" required></div>
        <div class="input-group"><label>Klinika Tel</label><input type="tel" id="clinicPhoneNumber" required></div>
        
        <div class="full-width">
            <button type="submit" class="btn btn-update">Yeniləməni Yadda Saxla</button>
        </div>
    </form>
</div>

<script src="./javascripts/edit.js"></script>
</body>
</html>
